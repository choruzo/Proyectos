<!DOCTYPE html>
<html lang="es" class="h-full" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }" :class="{ 'dark': darkMode }" x-init="$watch('darkMode', val => localStorage.setItem('darkMode', String(val)))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GALTTCMC CI/CD Pipeline{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <!-- Custom JavaScript (before Alpine.js) -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🚀</text></svg>">
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900" x-data="{ sidebarOpen: true }">
    <!-- Navbar -->
    <nav class="bg-indigo-600 dark:bg-indigo-800 shadow-lg">
        <div class="mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo & Title -->
                <div class="flex items-center">
                    <button @click="sidebarOpen = !sidebarOpen" class="text-white hover:text-indigo-200 mr-4">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                    <div class="flex items-center">
                        <span class="text-2xl mr-2">🚀</span>
                        <div>
                            <h1 class="text-white text-lg font-bold">GALTTCMC CI/CD</h1>
                            <p class="text-indigo-200 text-xs">Pipeline Monitor</p>
                        </div>
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="flex items-center space-x-4">
                    <!-- Auto-refresh toggle -->
                    <div class="flex items-center space-x-2 text-white" x-data="{ autoRefresh: false }">
                        <label class="text-sm">Auto-refresh</label>
                        <button @click="autoRefresh = !autoRefresh" 
                                :class="autoRefresh ? 'bg-green-500' : 'bg-gray-400'"
                                class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors">
                            <span :class="autoRefresh ? 'translate-x-6' : 'translate-x-1'"
                                  class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"></span>
                        </button>
                    </div>
                    
                    <!-- Dark mode toggle -->
                    <button @click="darkMode = !darkMode" class="text-white hover:text-indigo-200">
                        <svg x-show="!darkMode" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                        <svg x-show="darkMode" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </button>
                    
                    <!-- Server status -->
                    <div class="flex items-center space-x-2">
                        <div class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></div>
                        <span class="text-white text-sm">Online</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="flex h-[calc(100vh-4rem)]">
        <!-- Sidebar -->
        <aside x-show="sidebarOpen" 
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 transform -translate-x-full"
               x-transition:enter-end="opacity-100 transform translate-x-0"
               class="w-64 bg-white dark:bg-gray-800 shadow-lg overflow-y-auto">
            <nav class="mt-5 px-2">
                <a href="{{ url_for('index') }}" 
                   class="group flex items-center px-2 py-2 text-base font-medium rounded-md {% if request.endpoint == 'index' %}bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-200{% else %}text-gray-600 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
                    <svg class="mr-4 h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Dashboard
                </a>
                
                <a href="{{ url_for('pipeline_runs') }}"
                   class="mt-1 group flex items-center px-2 py-2 text-base font-medium rounded-md {% if request.endpoint == 'pipeline_runs' %}bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-200{% else %}text-gray-600 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
                    <svg class="mr-4 h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    Pipeline Runs
                </a>
                
                <a href="{{ url_for('logs') }}"
                   class="mt-1 group flex items-center px-2 py-2 text-base font-medium rounded-md {% if request.endpoint == 'logs' %}bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-200{% else %}text-gray-600 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
                    <svg class="mr-4 h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Logs
                </a>
                
                <a href="{{ url_for('sonar_results') }}"
                   class="mt-1 group flex items-center px-2 py-2 text-base font-medium rounded-md {% if request.endpoint == 'sonar_results' %}bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-200{% else %}text-gray-600 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700{% endif %}">
                    <svg class="mr-4 h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    SonarQube Results
                </a>
            </nav>
            
            <!-- Sidebar footer -->
            <div class="absolute bottom-0 w-64 p-4 bg-gray-100 dark:bg-gray-700">
                <div class="text-xs text-gray-500 dark:text-gray-400">
                    <p class="font-semibold">SUSE Linux 15</p>
                    <p>172.30.188.137</p>
                    <p class="mt-1">v1.0.0</p>
                </div>
            </div>
        </aside>
        
        <!-- Main content -->
        <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-900">
            <div class="py-6 px-4 sm:px-6 lg:px-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <!-- Toast notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
