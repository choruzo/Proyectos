sonar.projectKey=GALTTCMC_interno
sonar.projectName=GALTTCMC_interno
sonar.sources=./Development_TTCF
# Java
sonar.java.binaries=target/
sonar.java.libraries=Development_TTCF/ttcf/mmiCommon/lib/*.jar
sonar.coverage.jacoco.xmlReportPaths=JaCoCo/JaCoCo.xml
#sonar.java.spotbugs.reportPaths=spotbugs.xml
# C
sonar.cfamily.build-wrapper-output=./bw-output
#sonar.coverageReportPaths=./test_report.xml
# Exclussions
sonar.coverage.exclusions=**/*.c,**/*.h
sonar.exclusions=**/*.py, **/*.html, **/*.xml
# Server Configuration
sonar.host.url=https://YOUR_SONARQUBE_SERVER
sonar.token=${env.SONAR_TOKEN}
# Legacy login support (fallback)
sonar.login=YOUR_SONAR_TOKEN_HERE
